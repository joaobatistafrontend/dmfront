<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portal de Contestações DM{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js (Para interatividade: Modal e Sidebar) -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        [x-cloak] { display: none !important; }
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800" x-data="{ sidebarOpen: true, mobileMenuOpen: false }">

    <div class="flex min-h-screen">
        <!-- Sidebar -->
        {% include 'templates/navbar.html' %}

        <!-- Main Content -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            
            <!-- Mobile Header -->
            <header class="md:hidden bg-white border-b p-4 flex items-center justify-between">
                <button @click="mobileMenuOpen = true">
                    <i data-lucide="menu" class="text-[#004b93]"></i>
                </button>
                <span class="font-bold text-[#004b93]">Portal DM</span>
                <div class="w-6"></div>
            </header>

            <main class="flex-1 overflow-auto p-4 md:p-8">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Inicializa os ícones Lucide
        lucide.createIcons();
    </script>
</body>
</html>
